<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kimchi House AU Showcase</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background: #f7f7f7;
    }

    .showcase {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 56px 32px 48px;
    }

    .device-wrap {
      position: relative;
      width: 920px;
      height: 576px;
      overflow: visible;
    }

    .laptop {
      width: 100%;
      height: 100%;
      background: #111;
      border-radius: 20px;
      padding: 12px;
      box-shadow: 0 24px 56px rgba(0, 0, 0, 0.14);
    }

    .screen,
    .phone-screen {
      overflow: hidden;
      background: #fff;
    }

    .screen {
      width: 100%;
      height: 100%;
      border-radius: 10px;
    }

    .screen-scroll,
    .phone-scroll {
      transform: translate3d(0, 0, 0);
      backface-visibility: hidden;
    }

    .screen-scroll img,
    .phone-scroll img {
      width: 100%;
      height: auto;
      display: block;
      pointer-events: none;
      user-select: none;
    }

    .phone {
      position: absolute;
      right: -52px;
      bottom: -24px;
      width: 168px;
      height: 344px;
      background: #111;
      border-radius: 26px;
      padding: 7px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
      z-index: 2;
    }

    .phone-screen {
      width: 100%;
      height: 100%;
      border-radius: 20px;
    }
  </style>
</head>
<body>
  <main class="showcase">
    <section class="device-wrap">
      <div class="laptop">
        <div class="screen">
          <div class="screen-scroll" data-scroll-max="-1264">
            <img src="desktop-strip.jpg" alt="" decoding="sync" />
          </div>
        </div>
      </div>
      <div class="phone">
        <div class="phone-screen">
          <div class="phone-scroll" data-scroll-max="-900">
            <img src="mobile-strip.jpg" alt="" decoding="sync" />
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
